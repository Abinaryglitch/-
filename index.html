<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شجرة التسبيح</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background: linear-gradient(#dff6e4, #fff7dc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #2f4f3a;
    }

    .container {
      background: rgba(255, 255, 255, 0.8);
      padding: 25px;
      border-radius: 25px;
      width: 90%;
      max-width: 430px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h1 { margin-bottom: 5px; }

    .subtitle {
      color: #5c7a63;
      margin-bottom: 15px;
    }

    .tree {
      font-size: 85px;
      margin: 18px 0;
      transition: 0.3s ease;
    }

    .garden {
      font-size: 34px;
      margin: 15px 0;
      min-height: 45px;
      line-height: 1.4;
    }

    .counter {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    select, button {
      font-size: 18px;
      padding: 12px 18px;
      border-radius: 14px;
      border: none;
      margin: 8px;
    }

    select {
      background: #f2ffe9;
      color: #2f4f3a;
      border: 1px solid #b7d7b9;
    }

    button {
      background: #5fa76b;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 0 #3f7f49;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #3f7f49;
    }

    .reset {
      background: #d8a85f;
      box-shadow: 0 5px 0 #a87836;
    }

    .benefit, .finishHadith {
      background: #fffdf0;
      margin-top: 18px;
      padding: 15px;
      border-radius: 18px;
      border: 1px solid #eadfae;
      line-height: 1.8;
      font-size: 16px;
    }

    .finishHadith {
      display: none;
      background: #f1fff0;
      border-color: #b9dfb6;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🌿 شجرة التسبيح</h1>
    <p class="subtitle">كل 30 ذكرًا تنبت شجرة في حديقتك</p>

    <div id="tree" class="tree">🟤</div>

    <div class="counter">
      <span id="count">0</span> / 30
    </div>

    <select id="dhikrSelect" onchange="updateBenefit()">
      <option value="subhanAllah">سبحان الله</option>
      <option value="alhamdulillah">الحمد لله</option>
      <option value="allahuAkbar">الله أكبر</option>
      <option value="laIlaha">لا إله إلا الله</option>
      <option value="astaghfirullah">أستغفر الله</option>
    </select>

    <br />

    <button onclick="addDhikr()">اذكر الله</button>
    <button class="reset" onclick="resetAll()">إعادة</button>

    <div id="garden" class="garden"></div>

    <div id="benefit" class="benefit"></div>

    <div id="finishHadith" class="finishHadith"></div>
  </div>

  <script>
    let count = 0;
    let completedTrees = 0;
    let hadithIndex = 0;

    const treeStages = [
      "🟤",
      "🌱",
      "🌿",
      "🌳",
      "🌳",
      "🌲",
      "🌴"
    ];

    const gardenTrees = ["🌳", "🌲", "🌴", "🌳", "🌲", "🌴"];

    const benefits = {
      subhanAllah: `
        <strong>🌿 فضل سبحان الله</strong><br>
        قال رسول الله ﷺ:<br>
        «كلمتان خفيفتان على اللسان، ثقيلتان في الميزان، حبيبتان إلى الرحمن:
        سبحان الله وبحمده، سبحان الله العظيم.»<br>
        <small>متفق عليه</small>
      `,

      alhamdulillah: `
        <strong>🌿 فضل الحمد لله</strong><br>
        قال رسول الله ﷺ:<br>
        «والحمد لله تملأ الميزان.»<br>
        <small>رواه مسلم</small>
      `,

      allahuAkbar: `
        <strong>🌿 فضل الله أكبر</strong><br>
        التكبير من الباقيات الصالحات، وهي من خير الأعمال الباقية للعبد.<br>
        قال تعالى: ﴿والباقيات الصالحات خير عند ربك ثوابًا وخير أملًا﴾
      `,

      laIlaha: `
        <strong>🌿 فضل لا إله إلا الله</strong><br>
        قال رسول الله ﷺ:<br>
        «أفضل الذكر لا إله إلا الله.»<br>
        <small>رواه الترمذي</small>
      `,

      astaghfirullah: `
        <strong>🌿 فضل الاستغفار</strong><br>
        قال تعالى:<br>
        ﴿فقلت استغفروا ربكم إنه كان غفارًا ۝ يرسل السماء عليكم مدرارًا﴾
      `
    };

    const finishHadiths = [
      `
        <strong>💚 فضل الذكر</strong><br>
        قال رسول الله ﷺ:<br>
        «أحب الكلام إلى الله أربع: سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر.»<br>
        <small>رواه مسلم</small>
      `,
      `
        <strong>🌿 ذكر ثقيل في الميزان</strong><br>
        قال رسول الله ﷺ:<br>
        «كلمتان خفيفتان على اللسان، ثقيلتان في الميزان، حبيبتان إلى الرحمن:
        سبحان الله وبحمده، سبحان الله العظيم.»<br>
        <small>متفق عليه</small>
      `,
      `
        <strong>✨ كنز من كنوز الجنة</strong><br>
        قال رسول الله ﷺ:<br>
        «ألا أدلك على كنز من كنوز الجنة؟ لا حول ولا قوة إلا بالله.»<br>
        <small>متفق عليه</small>
      `,
      `
        <strong>🌱 غرس في الجنة</strong><br>
        قال رسول الله ﷺ:<br>
        «لقيت إبراهيم ليلة أسري بي، فقال: يا محمد أقرئ أمتك مني السلام، وأخبرهم أن الجنة طيبة التربة، عذبة الماء، وأنها قيعان، وأن غراسها: سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر.»<br>
        <small>رواه الترمذي</small>
      `
    ];

    function addDhikr() {
      count++;

      if (count > 30) {
        completeTree();
        count = 1;
      }

      document.getElementById("count").textContent = count;
      updateTree();

      if (count === 30) {
        completeTree();
        count = 0;
        document.getElementById("count").textContent = count;
        updateTree();
      }
    }

    function completeTree() {
      completedTrees++;

      const garden = document.getElementById("garden");
      const tree = gardenTrees[(completedTrees - 1) % gardenTrees.length];
      garden.innerHTML += tree;

      const finishBox = document.getElementById("finishHadith");
      finishBox.style.display = "block";
      finishBox.innerHTML = finishHadiths[hadithIndex];

      hadithIndex++;
      if (hadithIndex >= finishHadiths.length) {
        hadithIndex = 0;
      }
    }

    function updateTree() {
      let stageIndex = Math.floor(count / 5);

      if (stageIndex >= treeStages.length) {
        stageIndex = treeStages.length - 1;
      }

      document.getElementById("tree").textContent = treeStages[stageIndex];
    }

    function updateBenefit() {
      const selected = document.getElementById("dhikrSelect").value;
      document.getElementById("benefit").innerHTML = benefits[selected];
    }

    function resetAll() {
      count = 0;
      completedTrees = 0;
      hadithIndex = 0;

      document.getElementById("count").textContent = count;
      document.getElementById("tree").textContent = "🟤";
      document.getElementById("garden").innerHTML = "";
      document.getElementById("finishHadith").style.display = "none";
      document.getElementById("finishHadith").innerHTML = "";
    }

    updateBenefit();
  </script>
</body>
</html>
